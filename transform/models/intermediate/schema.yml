version: 2

models:
  - name: int_workout_hr_samples
    description: >
      HR samples that fell inside a workout window, tagged with zone_number
      and sample_duration_sec (via LEAD). One row per (workout, hr_sample).
    columns:
      - name: activity_type
        tests:
          - not_null
      - name: workout_start_ts_local
        tests:
          - not_null
      - name: workout_end_ts_local
        tests:
          - not_null
      - name: hr_ts_local
        tests:
          - not_null
      - name: hr_bpm
        tests:
          - not_null
      - name: sample_duration_sec
        tests:
          - not_null

  - name: int_daily_anomaly_bands
    description: >
      Tall-format daily metric values with a rolling 28-day mean, sample
      stddev, and z-score. Window excludes today (1 PRECEDING) so a fresh
      anomaly does not dilute its own threshold. One row per (metric, day);
      currently covers rhr_bpm and hrv_ms.
    columns:
      - name: day
        description: Calendar date in America/Chicago (date).
        tests:
          - not_null
      - name: metric
        description: >
          Name of the daily metric. Currently one of rhr_bpm or hrv_ms; new
          metrics (e.g. sleep_minutes) become additional UNION branches.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - rhr_bpm
                  - hrv_ms
      - name: value
        description: >
          Raw metric value for this (metric, day). RHR is bpm; HRV is SDNN
          ms. Always non-null because the upstream daily marts already drop
          null-value days.
        tests:
          - not_null
      - name: rolling_mean
        description: >
          Trailing 28-day mean of value, computed STRICTLY before today
          (rows between 28 preceding and 1 preceding). Null for the warm-up
          period until a 28-day window of priors exists.
      - name: rolling_std
        description: >
          Trailing 28-day sample standard deviation of value over the same
          1-PRECEDING window as rolling_mean. Null during warm-up and when
          all priors are identical.
      - name: z_score
        description: >
          (value - rolling_mean) / rolling_std. Null when rolling_std is
          null or zero (warm-up / no variance). |z| > 2 flags an anomaly
          in the Streamlit Anomaly Dashboard.
