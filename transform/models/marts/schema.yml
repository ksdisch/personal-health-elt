version: 2

models:
  - name: mart_daily_rhr
    description: >
      Daily resting heart rate (bpm) in America/Chicago. One row per day,
      primary-source-only via the staging dedup.
    columns:
      - name: day
        description: Calendar date in America/Chicago.
        tests:
          - not_null
          - unique
      - name: resting_heart_rate
        description: RHR in beats per minute.
        tests:
          - not_null
      - name: source_name
      - name: unit

  - name: mart_daily_hrv
    description: >
      Daily heart rate variability (SDNN, ms). One row per day — Apple Watch
      takes multiple HRV samples during sleep, averaged here.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: hrv_ms
        tests:
          - not_null
      - name: sample_count
        tests:
          - not_null

  - name: mart_daily_weight
    description: >
      Daily body mass (kg). Last reading wins when multiple readings happen
      on the same day. Currently empty — no smart scale tracked in Health.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: weight_kg
        tests:
          - not_null

  - name: mart_daily_vo2max
    description: >
      Daily VO2 Max (mL/(kg·min)). Sparse by nature — Apple only produces
      a reading after outdoor workouts. Multiple same-day readings averaged.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: vo2max
        tests:
          - not_null
      - name: sample_count
        tests:
          - not_null

  - name: mart_workout_zones
    description: >
      Per-workout HR zone breakdown. Time (seconds) in each of five zones
      from hr_zones.csv, plus avg/max HR. Feeds weekly training-load marts.
    columns:
      - name: day_local
        tests:
          - not_null
      - name: activity_type
        tests:
          - not_null
      - name: start_ts_local
        tests:
          - not_null
      - name: duration_sec
        tests:
          - not_null
      - name: zone_1_sec
        tests:
          - not_null
      - name: zone_2_sec
        tests:
          - not_null
      - name: zone_3_sec
        tests:
          - not_null
      - name: zone_4_sec
        tests:
          - not_null
      - name: zone_5_sec
        tests:
          - not_null
      - name: hr_sample_count
        tests:
          - not_null

  - name: mart_training_load
    description: >
      Daily training-load rollup with rolling 7-day and 28-day windows.
      Date spine fills zero-load days so rolling averages denominate
      correctly. training_load uses a simplified Banister TRIMP (Z1–Z5
      minutes weighted 1..5). ACWR = acute_load_7d / chronic_load_28d.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: zone_2_min
        tests:
          - not_null
      - name: zone_2_min_7d
        tests:
          - not_null
      - name: training_load
        tests:
          - not_null
      - name: acute_load_7d
        tests:
          - not_null
      - name: chronic_load_28d
        tests:
          - not_null

  - name: mart_recovery_state
    description: >
      PUBLIC API for the weekly-health-review Claude skill. Combines RHR,
      HRV, training load, and a rule-based recovery_signal into one daily
      row. Schema changes require lockstep updates to the consumer skill.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: is_today
        tests:
          - not_null
      - name: recovery_signal
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - well_recovered
                  - neutral
                  - strained
                  - insufficient_data

  - name: mart_monthly_aerobic_efficiency
    description: >
      Monthly time-weighted avg HR within Zone 2 plus total Zone 2 minutes.
      The slow-moving fitness signal: avg Z2 HR drifts down as the aerobic
      base builds. Zone 2 = zone_number 2 = 136–153 bpm.
    columns:
      - name: month
        description: >
          First day of the calendar month (America/Chicago) produced by
          date_trunc('month', workout_start_ts_local). Grain of the mart.
        tests:
          - not_null
          - unique
      - name: avg_z2_hr
        description: >
          Time-weighted average HR (bpm) across all Zone-2 samples in the
          month: sum(hr_bpm * sample_duration_sec) / sum(sample_duration_sec).
          Time-weighting prevents denser-sampled stretches from skewing the
          mean.
        tests:
          - not_null
      - name: z2_minutes
        description: >
          Total minutes spent in Zone 2 during the month (sum of HR-sample
          durations / 60).
        tests:
          - not_null
      - name: sample_count
        description: >
          Number of Zone-2 HR samples aggregated for the month. Useful for
          interpreting the stability of avg_z2_hr (small counts = noisy).
        tests:
          - not_null

  - name: mart_daily_signals
    description: >
      Wide-format daily signals for correlation / lagged analysis. Thin
      selector on mart_recovery_state with a numeric recovery_score column.
      Sleep duration appends here once ingestion is built. Companion to
      mart_recovery_state — same daily grain and overlapping columns, but
      mart_recovery_state is the public-API contract consumed by the
      weekly-health-review skill while this mart is the internal
      correlation lens.
    columns:
      - name: day
        description: Calendar date in America/Chicago. Grain of the mart.
        tests:
          - not_null
          - unique
      - name: rhr_bpm
        description: Resting heart rate (bpm) for the day, from mart_daily_rhr.
      - name: hrv_ms
        description: Heart rate variability (SDNN, ms) for the day, from mart_daily_hrv.
      - name: trimp
        description: >
          Day's TRIMP-style training load (zone minutes weighted 1..5);
          aliased from mart_recovery_state.training_load_today.
      - name: acwr
        description: >
          Acute-to-chronic workload ratio (acute_load_7d / chronic_load_28d)
          carried through from mart_training_load via mart_recovery_state.
      - name: recovery_signal
        description: >
          Rule-based recovery bucket from mart_recovery_state. Same domain
          as the public-API mart so the consumer enum stays in sync.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - well_recovered
                  - neutral
                  - strained
                  - insufficient_data
      - name: recovery_score
        description: >
          Numeric encoding of recovery_signal for correlation use:
          well_recovered → 1, neutral → 0, strained → -1,
          insufficient_data → null (the insufficient_data fall-through).
        tests:
          - accepted_values:
              arguments:
                values: [-1, 0, 1]
                quote: false

  - name: mart_daily_anomaly_bands
    description: >
      Tall-format daily metric values with a rolling 28-day mean, sample
      stddev, and z-score. Window excludes today (1 PRECEDING) so a fresh
      anomaly does not dilute its own threshold. One row per (metric, day);
      currently covers rhr_bpm and hrv_ms. Promoted from intermediate to
      marts because it refs mart_daily_rhr / mart_daily_hrv (a backwards
      arrow under the staging → intermediate → marts rule). Streamlit's
      06_anomaly.py queries this mart directly and pivots on (day, metric),
      hence the compound-unique singular test in transform/tests/.
    columns:
      - name: day
        description: Calendar date in America/Chicago (date).
        tests:
          - not_null
      - name: metric
        description: >
          Name of the daily metric. Currently one of rhr_bpm, hrv_ms, or
          sleep_min; new metrics become additional UNION branches.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - rhr_bpm
                  - hrv_ms
                  - sleep_min
      - name: value
        description: >
          Raw metric value for this (metric, day). RHR is bpm; HRV is SDNN
          ms. Always non-null because the upstream daily marts already drop
          null-value days.
        tests:
          - not_null
      - name: rolling_mean
        description: >
          Trailing 28-day mean of value, computed STRICTLY before today
          (rows between 28 preceding and 1 preceding). Null for the warm-up
          period until a 28-day window of priors exists.
      - name: rolling_std
        description: >
          Trailing 28-day sample standard deviation of value over the same
          1-PRECEDING window as rolling_mean. Null during warm-up and when
          all priors are identical.
      - name: z_score
        description: >
          (value - rolling_mean) / rolling_std. Null when rolling_std is
          null or zero (warm-up / no variance). |z| > 2 flags an anomaly
          in the Streamlit Anomaly Dashboard.

  - name: mart_sleep_stages
    description: >
      Hypnogram data source: one row per Apple sleep-stage segment per
      night, with an in-night sequence index for ordered rendering. Grain is
      (night_date, stage_start_local); enforced by the compound-unique
      singular test sleep_stages_unique_night_start.
    columns:
      - name: night_date
        description: Date you woke up (America/Chicago), noon-to-noon attribution.
        tests:
          - not_null
      - name: stage_start_local
        description: Segment start in America/Chicago.
        tests:
          - not_null
      - name: stage_end_local
        description: Segment end in America/Chicago.
        tests:
          - not_null
      - name: duration_min
        description: Segment duration in minutes.
        tests:
          - not_null
      - name: sleep_stage
        description: Apple sleep-stage label for the segment.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - asleepCore
                  - asleepDeep
                  - asleepREM
                  - asleepUnspecified
                  - asleep
                  - awake
                  - inBed
      - name: is_asleep
        description: True when sleep_stage is one of the five asleep* values (Core/Deep/REM/Unspecified/asleep).
      - name: source_name
        description: Device that recorded the segment.
      - name: stage_seq_in_night
        description: 1-based ordinal of this segment within its night, ordered by start.
        tests:
          - not_null

  - name: mart_sleep_nights
    description: >
      Per-night sleep rollup with a composite sleep score in [0, 100].
      One row per night_date. Rolls up the MAIN sleep period only — a
      same-day nap is a separate period (gap > 2h, classified in
      int_sleep_periods) and lands in mart_sleep_naps instead, so
      time_in_bed and sleep_efficiency_pct reflect actual nighttime
      sleep without nap inflation. Score weights/targets live in the
      sleep_score_weights seed.
    columns:
      - name: night_date
        description: Date you woke up (America/Chicago). Primary key.
        tests:
          - not_null
          - unique
      - name: time_in_bed_min
        description: >
          Minutes in bed for the night. Uses explicit inBed segments when
          present, otherwise falls back to wake_time_local - bedtime_local.
        tests:
          - not_null
      - name: time_asleep_min
        description: >
          Minutes asleep: sum of asleepCore + asleepDeep + asleepREM +
          asleepUnspecified + asleep (legacy/unstaged) durations.
        tests:
          - not_null
      - name: sleep_efficiency_pct
        description: 100 * time_asleep_min / time_in_bed_min, rounded to 1 dp.
      - name: rem_min
        description: Minutes in asleepREM for the night.
      - name: deep_min
        description: Minutes in asleepDeep for the night.
      - name: core_min
        description: Minutes in asleepCore for the night.
      - name: awake_min
        description: Minutes in awake segments during the night.
      - name: rem_pct_of_sleep
        description: 100 * rem_min / time_asleep_min, rounded to 1 dp.
      - name: deep_pct_of_sleep
        description: 100 * deep_min / time_asleep_min, rounded to 1 dp.
      - name: awakening_count
        description: Count of awake segments (each contiguous awake span is one awakening).
        tests:
          - not_null
      - name: bedtime_local
        description: Earliest segment start of the night (America/Chicago).
        tests:
          - not_null
      - name: wake_time_local
        description: Latest segment end of the night (America/Chicago).
        tests:
          - not_null
      - name: composite_score
        description: >
          Composite sleep score in [0, 100]. Weighted combination of
          efficiency, REM-of-sleep, and deep-of-sleep against per-user
          targets (sleep_score_weights seed), minus a fragmentation penalty
          per awakening. Clamped at 0 on the low end.
        tests:
          - not_null

  - name: mart_sleep_naps
    description: >
      Per-nap rollup. One row per non-main sleep period containing actual
      sleep time. Sibling to mart_sleep_nights: together they recover the
      full picture without polluting either. nap_date is the calendar date
      the nap actually happened on (period_start_local::date) — the more
      intuitive grain for "naps you took today" — while night_date
      preserves the upstream attribution for joins back to mart_sleep_nights.
    columns:
      - name: nap_date
        description: Calendar date the nap started on (America/Chicago).
        tests:
          - not_null
      - name: night_date
        description: >
          Upstream noon-to-noon night attribution from int_sleep_segments.
          Equal to nap_date for naps that started before noon, nap_date + 1
          for naps that started after noon.
        tests:
          - not_null
      - name: period_seq
        description: 1-indexed within-night identifier from int_sleep_periods.
        tests:
          - not_null
      - name: nap_start_local
        description: Period start in America/Chicago. Unique per row.
        tests:
          - not_null
          - unique
      - name: nap_end_local
        description: Period end in America/Chicago.
        tests:
          - not_null
      - name: duration_min
        description: Wall-clock span of the nap in minutes (end - start).
        tests:
          - not_null
      - name: time_asleep_min
        description: Minutes asleep within the nap. Always > 0 by definition (model filter).
        tests:
          - not_null
      - name: awakening_count
        description: Count of awake segments within the nap.
        tests:
          - not_null

  - name: mart_workout_hrr
    description: >
      Per-workout heart-rate recovery (HRR). One row per workout with
      peak_hr_bpm (max HR inside the workout) plus the HR drop measured
      at 30s / 60s / 120s after workout end. Each `hrr_*s` column is
      tolerance-gated — if no HR sample falls within ±15s (or ±30s for
      the 120s target) of its target offset, the column stays NULL
      rather than mislabeling a faraway sample. HRR shifts months
      before resting HR does, so this mart is the leading aerobic-
      capacity signal.
    columns:
      - name: activity_type
        description: Workout activity (Running, Cycling, Walking, ...).
        tests:
          - not_null
      - name: day_local
        description: Calendar date of workout start (America/Chicago).
        tests:
          - not_null
      - name: workout_start_local
        description: Workout start in America/Chicago.
        tests:
          - not_null
      - name: workout_end_local
        description: Workout end in America/Chicago.
        tests:
          - not_null
      - name: peak_hr_bpm
        description: Maximum HR (bpm) recorded inside the workout window.
        tests:
          - not_null
      - name: hr_at_30s
        description: HR (bpm) of the post-workout sample closest to 30s after end. NULL if no sample within ±15s.
      - name: offset_at_30s
        description: Actual seconds-after-end of the sample chosen for hr_at_30s.
      - name: hrr_30s
        description: >
          peak_hr_bpm minus hr_at_30s, when a sample exists within ±15s
          of the 30s target. NULL otherwise.
      - name: hr_at_60s
        description: HR (bpm) of the post-workout sample closest to 60s after end. NULL if no sample within ±15s.
      - name: offset_at_60s
        description: Actual seconds-after-end of the sample chosen for hr_at_60s.
      - name: hrr_60s
        description: >
          peak_hr_bpm minus hr_at_60s, when a sample exists within ±15s
          of the 60s target. NULL otherwise. This is the headline HRR
          metric — typical values 25–35 bpm for well-conditioned
          individuals, 40+ excellent, <15 poor.
      - name: hr_at_120s
        description: HR (bpm) of the post-workout sample closest to 120s after end. NULL if no sample within ±30s.
      - name: offset_at_120s
        description: Actual seconds-after-end of the sample chosen for hr_at_120s.
      - name: hrr_120s
        description: >
          peak_hr_bpm minus hr_at_120s, when a sample exists within
          ±30s of the 120s target. Tolerance is looser here because
          post-workout samples thin out fast. NULL otherwise.

  - name: mart_daily_context
    description: >
      External-context mart. One row per local day with weather columns
      (and future calendar density / Oura / HomeKit columns). Joined to
      mart_recovery_state on `day` for correlation analysis on page 09.
      Distinct from mart_recovery_state so the public API of the latter
      stays focused on internal health signals.
    columns:
      - name: day
        description: Calendar date.
        tests:
          - not_null
          - unique
      - name: temp_min_c
        description: Daily minimum temperature (Celsius). Nullable when OpenWeather omitted the reading.
      - name: temp_max_c
        description: Daily maximum temperature (Celsius).
      - name: temp_afternoon_c
        description: Mid-afternoon temperature (Celsius).
      - name: temp_night_c
        description: Overnight temperature (Celsius) — most relevant for sleep correlations.
      - name: humidity_afternoon
        description: Mid-afternoon relative humidity (%, 0-100).
      - name: cloud_cover_afternoon
        description: Mid-afternoon cloud cover (%, 0-100).
      - name: precip_total_mm
        description: Total daily precipitation (mm).
      - name: wind_max_mps
        description: Peak wind speed (m/s).
      - name: timed_event_count
        description: Number of non-all-day calendar events on this day. 0 when calendar is unconfigured.
        tests:
          - not_null
      - name: timed_event_hours
        description: Sum of timed-event durations (hours). 0 when calendar is unconfigured.
        tests:
          - not_null
      - name: all_day_event_count
        description: Number of all-day events covering this day.
        tests:
          - not_null
      - name: first_event_local
        description: Earliest timed-event start (local). NULL on days with no timed events.
      - name: last_event_local
        description: Latest timed-event end (local). NULL on days with no timed events.

exposures:
  - name: weekly_health_review
    label: weekly-health-review (Claude skill)
    type: application
    maturity: medium
    description: >
      External Claude skill that turns `mart_recovery_state` into a
      weekly briefing in the user's vault. Read CLAUDE.md "Public API"
      and the README's contract cell before changing the upstream
      mart: renames, drops, or unit changes must be reflected in the
      skill in lockstep. The dbt `accepted_values` + `unique` tests on
      `recovery_signal` / `day` are the durable contract surface.
    url: https://github.com/ksdisch/weekly-health-review
    owner:
      name: Kyle Disch
      email: kstan.disch@gmail.com
    depends_on:
      - ref('mart_recovery_state')

  - name: daily_workout_coach
    label: daily-workout-coach (Claude skill)
    type: application
    maturity: medium
    description: >
      External Claude skill that turns the latest `mart_recovery_state`
      row plus the trailing 14 days of `mart_training_load` into a daily
      workout recommendation card (session type, target zone, target
      duration, rationale). Second downstream consumer of
      `mart_recovery_state` — proves the public-API contract pattern by
      composition. Implementation lives at
      `~/Cowork/skills/daily-workout-coach/SKILL.md`; the recommendation
      logic lives in this repo at `scripts/daily_workout_coach.py`. Any
      schema change to either upstream mart requires updating that
      script in lockstep — the dbt `accepted_values` test on
      `recovery_signal` is the durable contract surface for the
      `well_recovered / neutral / strained / insufficient_data`
      vocabulary the coach branches on.
    owner:
      name: Kyle Disch
      email: kstan.disch@gmail.com
    depends_on:
      - ref('mart_recovery_state')
      - ref('mart_training_load')
