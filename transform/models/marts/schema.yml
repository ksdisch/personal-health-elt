version: 2

models:
  - name: mart_daily_rhr
    description: >
      Daily resting heart rate (bpm) in America/Chicago. One row per day,
      primary-source-only via the staging dedup.
    columns:
      - name: day
        description: Calendar date in America/Chicago.
        tests:
          - not_null
          - unique
      - name: resting_heart_rate
        description: RHR in beats per minute.
        tests:
          - not_null
      - name: source_name
      - name: unit

  - name: mart_daily_hrv
    description: >
      Daily heart rate variability (SDNN, ms). One row per day — Apple Watch
      takes multiple HRV samples during sleep, averaged here.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: hrv_ms
        tests:
          - not_null
      - name: sample_count
        tests:
          - not_null

  - name: mart_daily_weight
    description: >
      Daily body mass (kg). Last reading wins when multiple readings happen
      on the same day. Currently empty — no smart scale tracked in Health.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: weight_kg
        tests:
          - not_null

  - name: mart_daily_vo2max
    description: >
      Daily VO2 Max (mL/(kg·min)). Sparse by nature — Apple only produces
      a reading after outdoor workouts. Multiple same-day readings averaged.
    columns:
      - name: day
        tests:
          - not_null
          - unique
      - name: vo2max
        tests:
          - not_null
      - name: sample_count
        tests:
          - not_null

  - name: mart_workout_zones
    description: >
      Per-workout HR zone breakdown. Time (seconds) in each of five zones
      from hr_zones.csv, plus avg/max HR. Feeds weekly training-load marts.
    columns:
      - name: day_local
        tests:
          - not_null
      - name: activity_type
        tests:
          - not_null
      - name: start_ts_local
        tests:
          - not_null
      - name: duration_sec
        tests:
          - not_null
      - name: zone_1_sec
        tests:
          - not_null
      - name: zone_2_sec
        tests:
          - not_null
      - name: zone_3_sec
        tests:
          - not_null
      - name: zone_4_sec
        tests:
          - not_null
      - name: zone_5_sec
        tests:
          - not_null
      - name: hr_sample_count
        tests:
          - not_null
