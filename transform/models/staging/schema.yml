version: 2

models:
  - name: stg_quantities
    description: >
      1:1 reflection of raw.quantities with (a) HK prefix stripped from metric_type,
      (b) timestamps normalized to America/Chicago, and (c) multi-source dedup
      via source_priority (Apple Watch > iPhone > other).
    columns:
      - name: metric_name
        description: HealthKit identifier with HK(Quantity|Category)TypeIdentifier stripped.
        tests:
          - not_null
      - name: source_name
        description: Human-readable source device name from the export (e.g., "Kyle's Apple Watch").
      - name: start_ts_local
        description: start_ts converted to America/Chicago.
        tests:
          - not_null
      - name: end_ts_local
      - name: unit
      - name: value
        description: The metric reading (bpm, kg, minutes, etc., depending on metric_name).
        tests:
          - not_null
      - name: source_priority
        description: "1=Apple Watch, 2=iPhone, 3=other/third-party."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false

  - name: stg_workouts
    description: >
      1:1 reflection of raw.workouts with timestamps normalized to
      America/Chicago, a derived day_local column, and multi-source dedup.
    columns:
      - name: activity_type
        description: Workout activity (Running, Cycling, Walking, Yoga, ...).
        tests:
          - not_null
      - name: start_ts_local
        tests:
          - not_null
      - name: end_ts_local
        tests:
          - not_null
      - name: day_local
        description: Calendar date of start_ts in America/Chicago.
        tests:
          - not_null
      - name: duration_sec
        tests:
          - not_null
      - name: source_priority
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false

  - name: stg_weather
    description: >
      1:1 reflection of raw.weather with temperatures converted from
      Kelvin to Celsius. obs_date is renamed to `day` for consistency
      with downstream daily marts. Optional source — empty when
      OPENWEATHER_API_KEY is not configured.
    columns:
      - name: day
        description: Calendar date the summary covers (local to lat/lon per OpenWeather contract).
        tests:
          - not_null
      - name: lat
        tests:
          - not_null
      - name: lon
        tests:
          - not_null
      - name: temp_min_c
        description: Daily minimum temperature in Celsius.
      - name: temp_max_c
        description: Daily maximum temperature in Celsius.
      - name: temp_afternoon_c
        description: Mid-afternoon temperature reading in Celsius.
      - name: temp_night_c
        description: Overnight temperature reading in Celsius — most relevant for sleep correlations.
      - name: humidity_afternoon
        description: Mid-afternoon relative humidity (%, 0-100).
      - name: cloud_cover_afternoon
        description: Mid-afternoon cloud cover (%, 0-100).
      - name: pressure_hpa_afternoon
        description: Mid-afternoon surface pressure (hPa).
      - name: precip_total_mm
        description: Total precipitation over the day (mm).
      - name: wind_max_mps
        description: Peak wind speed (m/s).
      - name: wind_max_dir_deg
        description: Peak wind direction (degrees, 0-359).

  - name: stg_categories
    description: >
      1:1 reflection of raw.categories with (a) HKCategoryTypeIdentifier prefix
      stripped from category_type, (b) timestamps normalized to America/Chicago,
      and (c) multi-source dedup via source_priority (Apple Watch > iPhone > other).
    columns:
      - name: category_name
        description: HealthKit identifier with HKCategoryTypeIdentifier stripped.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SleepAnalysis
                  - AppleStandHour
                  - MindfulSession
                  - HeadphoneAudioExposureEvent
                  - AudioExposureEvent
                  - HighHeartRateEvent
                  - LowHeartRateEvent
      - name: category_value
        description: Category-specific value (e.g., asleepCore, stood, notApplicable). Nullable.
      - name: source_name
        description: Human-readable source device name from the export.
        tests:
          - not_null
      - name: start_ts_local
        description: start_ts converted to America/Chicago.
        tests:
          - not_null
      - name: end_ts_local
        description: end_ts converted to America/Chicago. May be NULL for point-in-time events.
      - name: hk_time_zone
        description: Original device time zone (set only on SleepAnalysis rows).
      - name: hk_heart_rate_threshold
        description: HR threshold string for HighHeartRateEvent / LowHeartRateEvent (e.g., "120 count/min").
      - name: source_priority
        description: "1=Apple Watch, 2=iPhone, 3=other/third-party."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false
