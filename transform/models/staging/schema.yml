version: 2

models:
  - name: stg_quantities
    description: >
      1:1 reflection of raw.quantities with (a) HK prefix stripped from metric_type,
      (b) timestamps normalized to America/Chicago, and (c) multi-source dedup
      via source_priority (Apple Watch > iPhone > other).
    columns:
      - name: metric_name
        description: HealthKit identifier with HK(Quantity|Category)TypeIdentifier stripped.
        tests:
          - not_null
      - name: source_name
        description: Human-readable source device name from the export (e.g., "Kyle's Apple Watch").
      - name: start_ts_local
        description: start_ts converted to America/Chicago.
        tests:
          - not_null
      - name: end_ts_local
      - name: unit
      - name: value
        description: The metric reading (bpm, kg, minutes, etc., depending on metric_name).
        tests:
          - not_null
      - name: source_priority
        description: "1=Apple Watch, 2=iPhone, 3=other/third-party."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false

  - name: stg_workouts
    description: >
      1:1 reflection of raw.workouts with timestamps normalized to
      America/Chicago, a derived day_local column, and multi-source dedup.
    columns:
      - name: activity_type
        description: Workout activity (Running, Cycling, Walking, Yoga, ...).
        tests:
          - not_null
      - name: start_ts_local
        tests:
          - not_null
      - name: end_ts_local
        tests:
          - not_null
      - name: day_local
        description: Calendar date of start_ts in America/Chicago.
        tests:
          - not_null
      - name: duration_sec
        tests:
          - not_null
      - name: source_priority
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false
