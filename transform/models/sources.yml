version: 2

sources:
  - name: raw
    description: "Raw Apple Health exports landed by the ingest loaders."
    schema: raw
    # All three raw tables share the same ingest cadence (weekly Sunday
    # load via ingest/flows/weekly_load.py), so we put freshness on the
    # source rather than per-table. Two days is the soft warning (a
    # missed export); seven days is the hard error (a dead loader).
    loaded_at_field: loaded_at
    freshness:
      warn_after: {count: 2, period: day}
      error_after: {count: 7, period: day}
    tables:
      - name: quantities
        description: "Quantity metrics — HR, HRV, weight, sleep, VO2 max, RHR, energy, steps."
      - name: categories
        description: "Category metrics — sleep stages, mindfulness sessions, symptoms."
      - name: workouts
        description: "Workout sessions with start/end, activity type, and totals."
