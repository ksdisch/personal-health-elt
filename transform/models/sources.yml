version: 2

sources:
  - name: raw
    description: "Raw Apple Health exports landed by the ingest loaders."
    schema: raw
    # All three raw tables share the same ingest cadence (weekly Sunday
    # load via ingest/flows/weekly_load.py), so we put freshness on the
    # source rather than per-table. Two days is the soft warning (a
    # missed export); seven days is the hard error (a dead loader).
    loaded_at_field: loaded_at
    freshness:
      warn_after: {count: 2, period: day}
      error_after: {count: 7, period: day}
    tables:
      - name: quantities
        description: "Quantity metrics — HR, HRV, weight, sleep, VO2 max, RHR, energy, steps."
      - name: categories
        description: "Category metrics — sleep stages, mindfulness sessions, symptoms."
      - name: workouts
        description: "Workout sessions with start/end, activity type, and totals."
      - name: weather
        description: >
          Daily weather summaries from OpenWeather One Call 3.0 day_summary
          endpoint. Optional cross-source enrichment — populated only when
          OPENWEATHER_API_KEY + lat/lon are configured. Units are the API's
          "standard" (K / m/s / hPa / mm); conversion happens in stg_weather.
        # Freshness disabled: this is an API-sourced optional table that may
        # be empty (no API key configured) — an empty table would otherwise
        # trip the source-level "no rows returned" error.
        freshness: null
      - name: experiment_effects
        description: >
          Personal causal-inference estimates (ITS level change with HAC errors,
          permutation p-value, difference-in-differences) computed by
          ingest/analysis/causal.py and read by stg_experiment_effects ->
          mart_experiment_effects. Optional — empty until the causal step runs.
        # Freshness disabled: computed table that may be empty (no experiments
        # logged / causal step not yet run).
        freshness: null
      - name: calendar_daily
        description: >
          Daily Google Calendar density (timed event count / hours /
          first / last) parsed from a secret iCal URL. Optional
          cross-source enrichment — populated only when
          CALENDAR_ICS_URL is set. Recurring events are expanded into
          instances before per-day aggregation. PK is (day,
          source_sha256); stg_calendar picks the latest SHA per day.
        freshness: null
