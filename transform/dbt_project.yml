name: 'personal_health_elt'
version: '0.1.0'
config-version: 2

profile: 'personal_health_elt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  personal_health_elt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  personal_health_elt:
    +schema: seeds
    hr_zones:
      +column_types:
        zone_number: integer
        zone_name: varchar
        hr_low: integer
        hr_high: integer
    sleep_score_weights:
      +column_types:
        weight_efficiency: numeric
        weight_rem: numeric
        weight_deep: numeric
        weight_fragmentation: numeric
        target_efficiency_pct: numeric
        target_rem_pct: numeric
        target_deep_pct: numeric
