name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Prepare dbt profile
        run: cp transform/profiles.yml.example transform/profiles.yml

      - name: dbt parse
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
          POSTGRES_DB: health
        run: uv run dbt parse --project-dir transform --profiles-dir transform
