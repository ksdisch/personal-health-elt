name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
          POSTGRES_DB: health
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U health -d health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: health
      PGPASSWORD: health  # for psql in the raw-schema init step

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy (ingest)
        # app/ is intentionally skipped — see BACKLOG: "Extend mypy to app/"
        run: uv run mypy ingest

      - name: Pytest with coverage
        run: uv run pytest --cov=ingest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Initialize raw schema
        run: psql -h localhost -U health -d health -f scripts/init_raw_schema.sql

      - name: Prepare dbt profile
        run: cp transform/profiles.yml.example transform/profiles.yml

      - name: dbt parse
        run: uv run dbt parse --project-dir transform --profiles-dir transform

      - name: dbt build (empty-schema smoke)
        # Compilation smoke: against empty raw.* tables, all models + tests must
        # compile + execute (not_null/unique/accepted_values pass trivially on
        # empty inputs). Catches SQL mismatches `dbt parse` misses (column drift,
        # bad joins, type errors). The REAL-DATA gate below is what actually
        # exercises the contract tests + branch logic on populated tables.
        run: uv run dbt build --project-dir transform --profiles-dir transform

      - name: Build synthetic demo warehouse (real-data gate)
        # Stands up an ISOLATED health_demo DB from a deterministic synthetic
        # corpus and dbt-builds the full warehouse — so accepted_values / unique
        # contract tests + dbt unit tests run against POPULATED data, not empty
        # tables. Zero iOS export, zero credentials. See ingest/synth/ and
        # docs/design/autonomous-build-plan.md.
        run: uv run python -m ingest.flows.make_demo_db

      - name: Populated-data regression tests
        # Run against the built health_demo warehouse:
        #  - golden snapshots: each mart's output over the synthetic corpus; drift goes RED.
        #  - NL→SQL anchors: every Query-page few-shot actually executes against the live
        #    mart schema (guards the ROUND-on-double class of bug the AST tests can't see).
        run: uv run pytest tests/test_golden_marts.py tests/test_query_anchors_db.py -q
